<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screening Room | Paris Women Cinefest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <a href="https://pariswomencinefest.art/" class="back-link">
                    <i class="bi bi-arrow-left"></i>
                    <span>Back to Main Site</span>
                </a>
                <div class="header-brand">
                    <span class="brand-text">PARIS</span>
                    <span class="brand-accent">Women Cinefest</span>
                </div>
                <h1 class="page-title">Screening Room</h1>
            </div>
        </div>
    </header>

    <!-- Main Screening Section -->
    <main class="screening-section">
        <div class="container">
            <!-- Category Filter -->
            <div class="category-section">
                <h3 class="filter-label">Filter by Category</h3>
                <div class="category-filter-wrapper">
                    <div class="category-filter" id="categoryFilter">
                        <!-- Categories generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Current Season Info -->
            <div class="season-info">
                <h2 class="season-title" id="currentSeasonTitle">Season 12 • Winter 2024</h2>
                <span class="film-count" id="filmCount">6 films</span>
            </div>

            <!-- Winners Grid -->
            <div class="winners-grid" id="winnersGrid">
                <!-- Winner cards generated by JS -->
            </div>
        </div>
    </main>

    <!-- Film Screening Modal -->
    <div class="modal fade" id="filmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-title-wrap">
                        <span class="modal-category" id="filmCategoryBadge">Best Film</span>
                        <h5 class="modal-title" id="filmModalTitle">Film Title</h5>
                    </div>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="film-player">
                        <div class="video-container" id="videoContainer">
                            <!-- Video inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>© 2025 Paris Women Cinefest. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
